name: Validate AI Context Bus

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Rebuild context snapshot
        run: python scripts/build_context_snapshot.py

      - name: Fail if snapshot is out of date
        run: |
          # The snapshot embeds a live "Generated on <timestamp>" line, so
          # compare ignoring that one line rather than a raw git diff.
          if ! diff <(git show HEAD:context/USL_CONTEXT_SNAPSHOT.md | grep -v '^> Generated by') \
                    <(grep -v '^> Generated by' context/USL_CONTEXT_SNAPSHOT.md); then
            echo "::error::context/USL_CONTEXT_SNAPSHOT.md is out of date. Run 'python scripts/build_context_snapshot.py' and commit the result."
            exit 1
          fi

      - name: Validate context bus (required files, no secrets, no controlled-data exposure)
        run: python scripts/validate_context_bus.py
